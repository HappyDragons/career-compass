<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求职罗盘 - 大学生求职导航工具</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header__logo">求职罗盘</div>
  <div class="header__sub">大学生求职导航工具 · 从迷茫到清晰</div>
  <div class="header__badge">公益赛道 · 大学生求职迷茫</div>
</header>

<!-- NAV TABS -->
<nav class="nav">
  <div class="nav__inner">
    <button class="nav__tab active" data-tab="sec-jd">JD翻译器</button>
    <button class="nav__tab" data-tab="sec-skill">技能雷达</button>
    <button class="nav__tab" data-tab="sec-plan">成长路线</button>
    <button class="nav__tab" data-tab="sec-interview">模拟面试</button>
    <button class="nav__tab" data-tab="sec-resume">简历优化</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">

  <!-- === MODULE 1: JD TRANSLATOR === -->
  <section id="sec-jd" class="section active">
    <h2 class="section__title">JD翻译器</h2>
    <p class="section__desc">看不懂招聘描述？选一个岗位或粘贴JD，帮你翻译成大白话</p>

    <div class="card">
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem">选择一个你感兴趣的岗位：</p>
      <div class="job-grid" id="jd-jobs"></div>
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.5rem">或者，直接粘贴一段招聘JD：</p>
      <textarea class="textarea" id="jd-input" placeholder="粘贴招聘描述到这里...&#10;&#10;例如：负责公司产品前端开发，要求熟练掌握React/Vue框架，具备良好的沟通能力..."></textarea>
      <div style="margin-top:1rem">
        <button class="btn btn--primary" id="jd-parse-btn">翻译这段JD</button>
      </div>
    </div>

    <div id="jd-result" class="result"></div>
  </section>

  <!-- === MODULE 2: SKILL GAP ANALYZER === -->
  <section id="sec-skill" class="section">
    <h2 class="section__title">技能雷达</h2>
    <p class="section__desc">选择目标岗位，评估你的技能水平，看看和岗位要求差多少</p>

    <div class="card">
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem">选择目标岗位：</p>
      <div class="job-grid" id="skill-jobs"></div>
    </div>

    <div id="skill-panel" class="card" style="display:none">
      <div class="radar-section">
        <div class="radar-chart">
          <canvas id="radar-canvas" width="400" height="400" style="max-width:100%;height:auto"></canvas>
        </div>
        <div class="radar-controls" id="skill-controls"></div>
      </div>
    </div>
  </section>

  <!-- === MODULE 3: ACTION PLAN === -->
  <section id="sec-plan" class="section">
    <h2 class="section__title">成长路线</h2>
    <p class="section__desc">选择你想走的方向，获取从大一到大四的完整准备路线</p>

    <div class="card">
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem">选择目标岗位：</p>
      <div class="job-grid" id="plan-jobs"></div>
    </div>

    <div id="plan-content" class="card" style="display:none"></div>
  </section>

  <!-- === MODULE 4: MOCK INTERVIEW === -->
  <section id="sec-interview" class="section">
    <h2 class="section__title">模拟面试</h2>
    <p class="section__desc">选择岗位，练习常见面试题，获取即时反馈</p>

    <div class="card">
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem">选择目标岗位：</p>
      <div class="job-grid" id="interview-jobs"></div>
    </div>

    <div id="interview-content" style="display:none"></div>
  </section>

  <!-- === MODULE 5: RESUME HELPER === -->
  <section id="sec-resume" class="section">
    <h2 class="section__title">简历优化</h2>
    <p class="section__desc">用STAR法则，把你的经历变成有说服力的简历表述</p>

    <div class="card">
      <div class="resume-input-group">
        <label for="resume-type">经历类型</label>
        <select class="select" id="resume-type">
          <option value="general">通用经历</option>
          <option value="tech">技术项目</option>
          <option value="product">产品/运营</option>
          <option value="design">设计项目</option>
          <option value="ops">运营活动</option>
        </select>
      </div>

      <div class="resume-input-group">
        <label for="resume-situation">S - 情境 (Situation)</label>
        <textarea id="resume-situation" rows="2" placeholder="什么背景下做的？例如：校园电商平台、暑期实习期间、百人规模社团"></textarea>
      </div>

      <div class="resume-input-group">
        <label for="resume-task">T - 任务 (Task)</label>
        <textarea id="resume-task" rows="2" placeholder="你负责什么？例如：首页改版设计、用户增长策略、数据库优化"></textarea>
      </div>

      <div class="resume-input-group">
        <label for="resume-action">A - 行动 (Action)</label>
        <textarea id="resume-action" rows="2" placeholder="具体做了什么？例如：重新设计了信息架构、搭建了数据埋点体系"></textarea>
      </div>

      <div class="resume-input-group">
        <label for="resume-result">R - 结果 (Result)</label>
        <textarea id="resume-result" rows="2" placeholder="成果是什么？用数据说话！例如：转化率提升30%、DAU增长2000+"></textarea>
      </div>

      <button class="btn btn--primary btn--block" id="resume-gen-btn">生成简历表述</button>
    </div>

    <div id="resume-output"></div>
  </section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>求职罗盘 · 大学生求职导航工具</p>
  <p style="margin-top:0.3rem">TRAE SOLO 挑战赛 · 公益赛道作品</p>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
